# Production-конфиг. Замените домены/email на свои перед деплоем.
# Интеграция: сеть 'libera' (external, edge SNI-preread :443 → default → web_nginx:9443).
# Изоляция: postgres/fastapi/nextjs в сети 'internal' (недоступны другим контейнерам).
# web_nginx — мост: в обеих сетях (принимает от edge в libera, проксирует в internal).
name: libera_cv

services:
  web_nginx:
    build: ./nginx_ssl
    image: libera-cv/nginx-ssl
    container_name: web_nginx
    hostname: web_nginx
    restart: always
    depends_on: [nextjs, fastapi]
    volumes:
      - libera_cv_le_ssl:/etc/nginx/ssl
      - ./nginx_ssl/conf/service_cv.conf:/etc/nginx/service_cv.conf
    environment:
      - TZ=Europe/Moscow
      - LETSENCRYPT=true
      - LE_EMAIL=you@example.com          # ← ваш email для Let's Encrypt
      - LE_FQDN=cv.example.com            # ← ваш домен
      - SSL_CERT=cv-le-crt.pem
      - SSL_KEY=cv-le-key.pem
      - SSL_CHAIN_CERT=cv-le-chain-crt.pem
    networks:
      - libera
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  postgres:
    image: postgres:16-alpine
    container_name: libera_cv_postgres
    restart: always
    env_file: .env
    volumes:
      - libera_cv_pg_data:/var/lib/postgresql/data
    networks: [internal]

  fastapi:
    build: .
    image: libera-cv/fastapi
    container_name: libera_cv_fastapi
    restart: always
    env_file: .env
    depends_on: [postgres]
    networks: [internal]

  nextjs:
    build:
      context: ../cv-frontend
      args:
        NEXT_PUBLIC_API_URL: https://cv.example.com   # ← ваш домен
    image: libera-cv/nextjs
    container_name: libera_cv_nextjs
    restart: always
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: https://cv.example.com   # ← ваш домен
      API_URL_INTERNAL: http://fastapi:8000
    depends_on: [fastapi]
    networks: [internal]

volumes:
  libera_cv_le_ssl:
  libera_cv_pg_data:

networks:
  libera:
    external: true
  internal:
    driver: bridge
