# nginx reverse-proxy для cv.libera.pro.
# Маршрутизация: /api/* → fastapi:8000, прочее → nextjs:3000 (SSR).
# Важно: X-Forwarded-For — без него rate-limit чата и ip_hash в link_hit
# получат IP nginx, а не реального клиента (см. app/request_utils.py).

# --- HTTP → HTTPS ---
server {
    listen 80;
    server_name cv.libera.pro libera.pro;
    # Путь для ACME-челленджа Let's Encrypt (получение сертификата).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- cv.libera.pro (основной домен) ---
server {
    listen 443 ssl http2;
    server_name cv.libera.pro;

    ssl_certificate     /etc/letsencrypt/live/cv.libera.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cv.libera.pro/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Размер тела (chat message до 2000 символов + запас).
    client_max_body_size 64k;

    # Security headers.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Чат: SSE-стриминг — ОТКЛЮЧАЕМ буферизацию, увеличиваем таймаут.
    location /api/chat {
        proxy_pass http://fastapi:8000;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Прочие API эндпоинты.
    location /api/ {
        proxy_pass http://fastapi:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js (лендинг, SSR CV, граф).
    location / {
        proxy_pass http://nextjs:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- libera.pro → редирект на cv.libera.pro ---
server {
    listen 443 ssl http2;
    server_name libera.pro;

    ssl_certificate     /etc/letsencrypt/live/libera.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/libera.pro/privkey.pem;

    return 301 https://cv.libera.pro$request_uri;
}
