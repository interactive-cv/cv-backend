server {
    listen      9443 ssl;
    server_name cv.libera.pro libera.pro;

    ssl_certificate         SSL_CERT;
    ssl_certificate_key     SSL_KEY;
    ssl_trusted_certificate SSL_CHAIN_CERT;

    add_header Strict-Transport-Security "max-age=63072000; includeSubdomains; preload";

    access_log on;

    # Редирект libera.pro → cv.libera.pro
    if ($host = libera.pro) {
        return 301 https://cv.libera.pro$request_uri;
    }

    # webroot для ACME-челленджа Let's Encrypt (certbot пишет сюда).
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    # Чат: SSE-стриминг — ОТКЛЮЧАЕМ буферизацию, увеличиваем таймаут.
    location /api/chat {
        proxy_pass http://fastapi:8000;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Прочие API эндпоинты.
    location /api/ {
        proxy_pass http://fastapi:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js (лендинг, SSR CV, граф).
    location / {
        proxy_pass http://nextjs:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
