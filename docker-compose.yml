services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  fastapi:
    build: .
    env_file: .env
    depends_on: [postgres]
    ports: ["8000:8000"]
    volumes: ["./app:/app/app"]

volumes:
  pgdata:
